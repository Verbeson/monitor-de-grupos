<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ALERTA - MONITORAMENTO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      width: 480px;
      height: 280px;
      overflow: hidden;
      user-select: none;
    }
    .container {
      padding: 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 18px;
    }
    .icon {
      font-size: 36px;
      margin-right: 15px;
      color: #e67e22;
      line-height: 1;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
    }
    .info {
      margin-bottom: 6px;
    }
    .info-label {
      font-size: 14px;
      color: #34495e;
    }
    .info-label strong {
      font-weight: 700;
    }
    .msg-box {
      flex: 1;
      margin-top: 8px;
      padding: 10px;
      font-size: 14px;
      color: #333;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow-y: auto;
      word-wrap: break-word;
      white-space: pre-wrap;
      min-height: 55px;
      max-height: 80px;
    }
    .btn-ok {
      display: block;
      margin: 14px auto 0;
      width: 120px;
      height: 38px;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-ok:hover {
      background: #219a52;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="icon">&#x26A0;</span>
      <span class="title">Nova mensagem no grupo!</span>
    </div>
    <div class="info">
      <span class="info-label"><strong>Grupo:</strong> <span id="grupo"></span></span>
    </div>
    <div class="info">
      <span class="info-label"><strong>Remetente:</strong> <span id="remetente"></span></span>
    </div>
    <div class="msg-box" id="mensagem"></div>
    <button class="btn-ok" id="btnOk">OK</button>
  </div>
  <script src="alert.js"></script>
</body>
</html>
